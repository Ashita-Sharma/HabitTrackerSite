<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add a task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
</head>

<body>

    <h1 class="text-center py-5">Add a new task</h1>

    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">

            <form action="{{ url_for('dashboard') }}" method="post">
    <label for="TaskName" class="form-label">Task Title</label>
    <input name="TaskName" type="text" class="form-control" id="TaskName" required>

    <label for="TextDescription" class="form-label">Description</label>
    <input name="TextDescription" type="text" class="form-control" id="TextDescription">

    <label for="Deadline" class="form-label">Deadline</label>
    <input type="date" id="Deadline" name="Deadline" class="form-control">

    <label for="Priority" class="form-label">Priority</label>
    <select name="Priority" id="Priority" class="form-select">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
    </select>

    <button type="submit" class="btn btn-primary mt-3">Add Task</button>
</form>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
</body>

</html>
